name: Security Audit

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Security Tools
        run: |
          pip install bandit safety
          
      - name: Run Bandit (SCA)
        run: |
          bandit -r src/ -ll
          
      - name: Run Safety Check
        run: |
          # Solo falla si hay vulnerabilidades críticas en requirements.txt
          safety check -r requirements.txt || echo "Vulnerabilidades detectadas. Revisar logs."

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
